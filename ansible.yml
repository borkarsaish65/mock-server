---
- name: Deploy saathi-mock-app
  hosts: saathi
  become: false
  vars:
    repo_url: "https://github.com/borkarsaish65/mock-server.git"
    app_dir: "/home/saish/saathi-mock-app"
    pm2_app_name: "saathi-mock-app"
    gitBranch: "main"

  tasks:
    - name: Clone or update saathi-mock-app repo
      ansible.builtin.git:
        repo: "{{ repo_url }}"
        dest: "{{ app_dir }}"
        version: "{{ gitBranch }}"
        force: true

    - name: Install npm dependencies
      ansible.builtin.shell:
        cmd: "source ~/.bashrc && cd {{ app_dir }} && npm install"
        executable: /bin/bash
      register: npm_install_result
      changed_when: "'up to date' not in npm_install_result.stdout"

    - name: Stop existing pm2 process if running
      ansible.builtin.shell:
        cmd: "source ~/.bashrc && pm2 stop {{ pm2_app_name }}"
        executable: /bin/bash
      register: pm2_stop_result
      failed_when: false
      changed_when: pm2_stop_result.rc == 0

    - name: Start app with pm2
      ansible.builtin.shell:
        cmd: "source ~/.bashrc && cd {{ app_dir }} && pm2 start server.js --name {{ pm2_app_name }}"
        executable: /bin/bash

    - name: Save pm2 process list
      ansible.builtin.shell:
        cmd: "source ~/.bashrc && pm2 save"
        executable: /bin/bash