---
- name: Deploy saathi-mock-app
  hosts: saathi
  become: false
  vars:
    repo_url: "https://github.com/borkarsaish65/mock-server.git"
    app_dir: "/home/saish/saathi-mock-app"
    pm2_app_name: "saathi-mock-app"
    gitBranch: "main"

  tasks:
    - name: Clone or update saathi-mock-app repo
      git:
        repo: "{{ repo_url }}"
        dest: "{{ app_dir }}"
        version: "{{ gitBranch }}"
        force: true

    - name: Install npm dependencies
      shell: "cd {{ app_dir }} && /usr/bin/npm install"
      register: npm_install_result

    - name: Show npm install output
      debug:
        var: npm_install_result

    - name: Stop existing pm2 process if running
      shell: "pm2 stop {{ pm2_app_name }}"
      register: pm2_stop_result
      ignore_errors: true

    - name: Start app with pm2
      shell: "cd {{ app_dir }} && pm2 start server.js --name {{ pm2_app_name }}"
      register: pm2_start_result

    - name: Show pm2 start output
      debug:
        var: pm2_start_result

    - name: Save pm2 process list
      shell: "pm2 save"